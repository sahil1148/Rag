<!DOCTYPE html>
<html>
<head>
    <title>Doc RAG Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 600px;
            height: 600px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px;
            background: #0d6efd;
            color: white;
            font-size: 18px;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 12px;
        }

        .user {
            text-align: right;
            color: #0d6efd;
        }

        .bot {
            text-align: left;
            color: #333;
        }

        .input-container {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin-left: 10px;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background: #0d6efd;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #084ec1;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        📄 Doc RAG Assistant
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-container">
        <input type="text" id="question" placeholder="Ask something about the document..." />
        <button onclick="sendQuestion()">Send</button>
    </div>
</div>

<script>
    async function sendQuestion() {
        const input = document.getElementById("question");
        const question = input.value.trim();
        if (!question) return;

        const chatBox = document.getElementById("chatBox");

        chatBox.innerHTML += `<div class="message user"><b>You:</b> ${question}</div>`;
        input.value = "";

        const response = await fetch(`/chat?question=${encodeURIComponent(question)}`);
        const answer = await response.text();

        chatBox.innerHTML += `<div class="message bot"><b>Bot:</b> ${answer}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
